<!doctype html>
<html lang="en" class="theme-catalyst dark">
  <head>
    <meta charset="UTF-8" />
    <!--
      Favicon: we ship 3 sizes (32 / 64 / 128) for crisp display from
      pinned-tab (16px renders from 32) up to retina tabs (128). The
      id="app-favicon" element is the one src/util/rotatingFavicon
      cycles between the 4 quadrant variants — the others stay
      static fallbacks if the rotation is disabled (reduced-motion).
    -->
    <link id="app-favicon" rel="icon" type="image/png" sizes="64x64" href="./favicon-tl-64.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-tl-32.png" />
    <link rel="icon" type="image/png" sizes="128x128" href="./favicon-tl-128.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700;900&family=JetBrains+Mono:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
    />
    <title>Factorio Blueprint Calculator</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
