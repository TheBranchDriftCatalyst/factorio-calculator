<!doctype html>
<html lang="en" class="theme-catalyst dark">
  <head>
    <meta charset="UTF-8" />
    <!--
      Static favicon — bold gear+factory mark that reads at any
      size. Multiple sizes declared so the browser picks the right
      one per surface (16px = pinned tab, 32px = standard tab bar,
      192px = Android home screen / PWA).
    -->
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-x-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-x-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="./favicon-x-64.png" />
    <link rel="icon" type="image/png" sizes="128x128" href="./favicon-x-128.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="./favicon-x-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700;900&family=JetBrains+Mono:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
    />
    <title>Factorio Blueprint Calculator</title>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
