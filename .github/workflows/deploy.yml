name: Deploy to GitHub Pages

on:
  push:
    branches: [master, catalyst-upgrade]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app deps
        working-directory: app
        run: npm ci

      - name: Build app
        working-directory: app
        env:
          VITE_BASE: /${{ github.event.repository.name }}/app/
        run: npm run build

      - name: Assemble site
        run: |
          mkdir -p _site
          # Copy the legacy kirkmcdonald static site at the root, excluding
          # the React app source, scratch files, and dev-only directories.
          rsync -a \
            --exclude='app/' \
            --exclude='.github/' \
            --exclude='.git/' \
            --exclude='.beads/' \
            --exclude='.claude/' \
            --exclude='.playwright-mcp/' \
            --exclude='.dolt/' \
            --exclude='scripts/' \
            --exclude='docs/' \
            --exclude='posts/' \
            --exclude='AGENTS.md' \
            --exclude='CLAUDE.md' \
            --exclude='Dockerfile' \
            --exclude='.dockerignore' \
            --exclude='.gitignore' \
            --exclude='*.md' \
            ./ _site/
          # Place the built React app under /app/ so it deploys to
          # /<repo>/app/ alongside the legacy site at /<repo>/.
          mkdir -p _site/app
          cp -R app/dist/. _site/app/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
